name: Release

# GITHUB_TOKEN 默认只读，发布 Release 需要写权限
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

env:
  MIX_ENV: prod
  ZIG_VERSION: "0.15.2"

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'

      - name: Install Zig
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils jq wget
          index="$(curl -fsSL https://ziglang.org/download/index.json)"
          zig_url="$(printf '%s' "$index" | jq -r ".\"${ZIG_VERSION}\".\"x86_64-linux\".tarball")"
          zig_pkg="$(basename "$zig_url")"
          wget -q "$zig_url"
          tar -xf "$zig_pkg"
          sudo mv "${zig_pkg%.tar.xz}" /usr/local/zig
          sudo ln -sf /usr/local/zig/zig /usr/local/bin/zig
          zig version

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - name: Fetch deps
        run: mix deps.get --only prod

      - name: Build Linux
        run: BURRITO_TARGET=linux mix release beacon --overwrite

      - name: Build macOS ARM
        run: BURRITO_TARGET=macos_arm mix release beacon --overwrite

      - name: Build macOS Intel
        run: BURRITO_TARGET=macos_intel mix release beacon --overwrite

      - name: Build Windows
        run: BURRITO_TARGET=windows mix release beacon --overwrite

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            burrito_out/beacon_linux
            burrito_out/beacon_macos_arm
            burrito_out/beacon_macos_intel
            burrito_out/beacon_windows.exe
